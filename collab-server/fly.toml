# Fly.io deploy config. Run once: `fly launch --no-deploy` (or `fly apps create
# nexusblock-collab`), then `fly deploy`. WebSockets work over the default
# https/wss handler; no extra config needed.

app = "nexusblock-collab"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 1234
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
